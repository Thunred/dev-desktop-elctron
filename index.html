<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Bloc-Notes</title>
		<style>
			body { margin: 0; font-family: sans-serif; background:#111; color:#ddd }
			/* Toolbar & controls */
			.toolbar { display:flex; gap:8px; padding:8px; align-items:center; background:#0f0f0f; }
			button { background:#222; color:#ddd; border:1px solid #333; padding:6px 10px; cursor:pointer }
			#counter { margin-left:auto; color:#bbb }
			textarea { width:100%; height:calc(100vh - 56px); box-sizing:border-box; padding:12px; background:#0b0b0b; color:#e6e6e6; border:0; outline:none; font-family: monospace; font-size:14px; }

			/* Light theme overrides */
			body.light { background: #fff; color: #111 }
			body.light .toolbar { background: #f5f5f5 }
			body.light button { background: #fff; color: #111; border:1px solid #ddd }
			body.light #counter { color: #444 }
			body.light textarea { background: #fff; color: #111 }
		</style>
	</head>
	<body>
		<div class="toolbar">
			<button id="newBtn">Nouveau</button>
			<button id="openBtn">Ouvrir</button>
			<button id="saveBtn">Sauvegarder</button>
			<button id="themeBtn">Mode clair</button>
			<div id="counter">0 caractères</div>
		</div>
		<textarea id="editor" placeholder="Écrivez votre texte ici..."></textarea>
		<script src="renderer.js"></script>
	</body>
</html>
